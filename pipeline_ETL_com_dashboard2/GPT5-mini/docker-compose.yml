version: '3.8'
services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: salesdb
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: ./
    command: python -u src/mock_api/app.py
    volumes:
      - ./:/app
    ports:
      - "5000:5000"
    depends_on:
      - db

  web:
    build: .
    command: streamlit run src/dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    depends_on:
      - db
      - api

volumes:
  db-data:
