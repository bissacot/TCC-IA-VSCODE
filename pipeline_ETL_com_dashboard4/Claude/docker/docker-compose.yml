version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sales_etl_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sales_etl_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_schema.sql:/docker-entrypoint-initdb.d/01-init_schema.sql
      - ./sql/sample_data.sql:/docker-entrypoint-initdb.d/02-sample_data.sql
    networks:
      - sales_etl_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ETL Application
  etl:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sales_etl_app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sales_etl_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      LOG_LEVEL: INFO
      API_BASE_URL: https://api.example.com
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sales_etl_network
    command: python etl_cli.py run

  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: sales_dashboard
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sales_etl_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sales_etl_network
    command: streamlit run src/dashboard/app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  postgres_data:

networks:
  sales_etl_network:
    driver: bridge
