version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sales_etl_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-sales_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/sample_data.sql:/docker-entrypoint-initdb.d/02-sample-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sales_etl_network

  etl_pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sales_etl_pipeline
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-sales_db}
      API_BASE_URL: ${API_BASE_URL:-https://api.example.com}
      CSV_PATH: /app/data/input/sales.csv
      JSON_PATH: /app/data/input/customers.json
      LOG_LEVEL: INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - sales_etl_network
    command: python run_etl.py

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: sales_dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-sales_db}
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - sales_etl_network
    command: streamlit run src/dashboard/app.py

volumes:
  postgres_data:

networks:
  sales_etl_network:
    driver: bridge
